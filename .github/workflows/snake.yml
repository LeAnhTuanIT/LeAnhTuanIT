name: Generate Snake

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: Platane/snk@v3
              with:
                  github_user_name: LeAnhTuanIT
                  outputs: |
                      dist/github-snake.svg
                      dist/github-snake-dark.svg?palette=github-dark
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Deploy to output branch
              run: |
                  REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git clone --single-branch --branch output "$REPO" deploy 2>/dev/null || {
                    mkdir deploy && cd deploy && git init && git checkout --orphan output && cd ..
                  }
                  cp dist/* deploy/
                  cd deploy
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --cached --quiet || (git commit -m "Update snake SVGs" && git push "$REPO" output)
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
