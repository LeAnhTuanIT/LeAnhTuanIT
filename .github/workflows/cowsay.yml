name: Generate Daily Content

on:
    schedule:
        - cron: "30 0 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Generate Cowsay SVG
              run: python .github/scripts/cowsay.py

            - name: Generate Joke SVG
              run: python .github/scripts/joke.py

            - name: Generate Horoscope SVG
              run: python .github/scripts/horoscope.py

            - name: Deploy to output branch
              run: |
                  REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git clone --single-branch --branch output "$REPO" deploy 2>/dev/null || {
                    mkdir deploy && cd deploy && git init && git checkout --orphan output && cd ..
                  }
                  cp dist/* deploy/
                  cd deploy
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --cached --quiet || (git commit -m "Update daily content SVGs" && git push "$REPO" output)
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
