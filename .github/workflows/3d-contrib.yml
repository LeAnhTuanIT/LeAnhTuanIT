name: Generate 3D Contribution

on:
    schedule:
        - cron: "15 0 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: yoshi389111/github-profile-3d-contrib@v0.9.2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  USERNAME: LeAnhTuanIT

            - name: Deploy to output branch
              run: |
                  REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git clone --single-branch --branch output "$REPO" deploy 2>/dev/null || {
                    mkdir deploy && cd deploy && git init && git checkout --orphan output && cd ..
                  }
                  mkdir -p deploy/3d-contrib
                  cp profile-3d-contrib/* deploy/3d-contrib/
                  cd deploy
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --cached --quiet || (git commit -m "Update 3D contribution graph" && git push "$REPO" output)
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
