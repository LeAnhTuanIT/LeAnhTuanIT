<svg xmlns="http://www.w3.org/2000/svg" width="504" height="244" viewBox="0 0 504 244">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  <rect fill="url(#grad)" width="504" height="244" rx="12" stroke="#d0d7de" stroke-width="1"/>
  <text font-size="24" text-anchor="middle" x="252" y="48">&#128514;</text>
  <text fill="#24292e" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="15" font-weight="500">
    <tspan x="28" y="84">A programmer&#x27;s wife tells him: &#x27;Go to the store and</tspan>
    <tspan x="28" y="106">get a loaf of bread. If they have eggs, get a</tspan>
    <tspan x="28" y="128">dozen.&#x27;</tspan>
  </text>
  <line x1="28" y1="162" x2="476" y2="162" stroke="#0969da" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text fill="#0969da" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="15" font-weight="700" font-style="italic">
    <tspan x="28" y="190">He came back with 12 loaves of bread.</tspan>
  </text>
</svg>